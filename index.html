<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MCP Test Agent</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        background: #f6f7f9;
        color: #1a1a1a;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #14161a; color: #eee; }
        .msg.user      { background: #1e3a5f; }
        .msg.assistant { background: #23262d; }
        .msg.tool      { background: #2a1f0a; color: #f0d090; }
        textarea, input, select { background: #23262d; color: #eee; border-color: #444; }
        .config, .wallet { background: #1c1f25; border-color: #333; }
        .wallet .bar { background: #333; }
      }
      header {
        padding: 12px 20px;
        border-bottom: 1px solid #ddd3;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      header h1 { margin: 0; font-size: 16px; font-weight: 600; flex: 1; }
      select, input[type="text"] {
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font: inherit;
        font-size: 13px;
      }
      .config, .wallet {
        max-width: 760px;
        margin: 12px auto 0;
        padding: 10px 20px;
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
      }
      .config {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .config label { font-size: 12px; color: #888; white-space: nowrap; }
      .config input { flex: 1; min-width: 160px; }

      .wallet {
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .wallet .label { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
      .wallet .value { font-weight: 600; font-variant-numeric: tabular-nums; }
      .wallet .bar {
        flex: 1;
        min-width: 120px;
        height: 8px;
        background: #eee;
        border-radius: 4px;
        overflow: hidden;
      }
      .wallet .fill { height: 100%; background: #1a73e8; transition: width 0.3s; }
      .wallet .fill.over { background: #d93025; }

      main {
        max-width: 760px;
        margin: 12px auto 0;
        padding: 0 20px 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .msg {
        padding: 10px 14px;
        border-radius: 10px;
        white-space: pre-wrap;
        line-height: 1.45;
        font-size: 14px;
      }
      .msg.user      { background: #dbeafe; align-self: flex-end; max-width: 80%; }
      .msg.assistant { background: #fff; align-self: flex-start; max-width: 90%; border: 1px solid #0001; }
      .msg.tool      { background: #fff7e6; font-family: ui-monospace, monospace; font-size: 12px; }
      .msg.error     { background: #fee; color: #900; }
      .msg.system    { background: transparent; color: #888; font-size: 12px; align-self: center; }
      form {
        position: sticky;
        bottom: 0;
        max-width: 760px;
        margin: 0 auto;
        padding: 12px 20px 20px;
        display: flex;
        gap: 8px;
        background: inherit;
      }
      textarea {
        flex: 1;
        resize: none;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font: inherit;
        min-height: 44px;
        max-height: 160px;
      }
      button {
        padding: 0 18px;
        border-radius: 8px;
        border: none;
        background: #1a73e8;
        color: white;
        font-weight: 600;
        cursor: pointer;
        font: inherit;
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <header>
      <h1>MCP Test Agent</h1>
      <select id="provider" title="LLM provider">
        <option value="anthropic">Anthropic — claude-sonnet-4-6</option>
        <option value="openai">OpenAI — gpt-4o</option>
        <option value="gemini">Google — gemini-2.0-flash</option>
      </select>
    </header>

    <div class="config">
      <label>MCP Server URL</label>
      <input type="text" id="mcpUrl" placeholder="https://your-mcp-server.vercel.app/mcp" />
    </div>

    <div class="wallet" id="wallet" style="display:none">
      <span class="label">Wallet</span>
      <span><span class="value" id="walletSpent">–</span> / <span id="walletLimit">–</span></span>
      <div class="bar"><div class="fill" id="walletFill" style="width:0%"></div></div>
      <span class="label">Per-call cap</span>
      <span class="value" id="walletCap">–</span>
    </div>

    <main id="log"></main>

    <form id="form">
      <textarea id="input" placeholder="Give the agent a task…" rows="1"></textarea>
      <button id="send" type="submit">Send</button>
    </form>

    <script type="module">
      const log        = document.getElementById('log');
      const form       = document.getElementById('form');
      const input      = document.getElementById('input');
      const send       = document.getElementById('send');
      const providerEl = document.getElementById('provider');
      const mcpUrlEl   = document.getElementById('mcpUrl');
      const walletBox  = document.getElementById('wallet');
      const walletSpent = document.getElementById('walletSpent');
      const walletLimit = document.getElementById('walletLimit');
      const walletCap   = document.getElementById('walletCap');
      const walletFill  = document.getElementById('walletFill');

      const history = [];
      const fmtUSD = (cents) => `$${(cents / 100).toFixed(2)}`;

      function add(cls, text) {
        const div = document.createElement('div');
        div.className = `msg ${cls}`;
        div.textContent = text;
        log.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'end' });
      }

      function renderBlocks(blocks) {
        let assistantText = '';
        for (const b of blocks) {
          if (b.type === 'text') {
            assistantText += (assistantText ? '\n' : '') + b.text;
          } else if (b.type === 'tool_use') {
            add('tool', `→ ${b.name}(${JSON.stringify(b.input)})`);
          } else if (b.type === 'tool_result') {
            const preview = b.content.length > 600 ? b.content.slice(0, 600) + '…' : b.content;
            add('tool', `← ${preview}`);
          }
        }
        if (assistantText) add('assistant', assistantText);
        return assistantText;
      }

      async function refreshWallet() {
        try {
          const r = await fetch('/api/wallet/status');
          if (!r.ok) return;
          const s = await r.json();
          walletSpent.textContent = fmtUSD(s.daily_spend_cents);
          walletLimit.textContent = fmtUSD(s.daily_limit_cents);
          walletCap.textContent   = fmtUSD(s.per_call_limit_cents);
          const pct = Math.min(100, (s.daily_spend_cents / s.daily_limit_cents) * 100);
          walletFill.style.width = `${pct}%`;
          walletFill.classList.toggle('over', pct >= 100);
          walletBox.style.display = '';
        } catch {}
      }
      refreshWallet();

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        const mcpUrl = mcpUrlEl.value.trim();
        if (!mcpUrl) { add('error', 'Enter an MCP Server URL above.'); return; }

        input.value = '';
        send.disabled = true;
        add('user', text);
        history.push({ role: 'user', content: text });

        try {
          const r = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              provider: providerEl.value,
              messages: history,
              mcpUrl,
            }),
          });

          const data = await r.json();

          if (!r.ok) {
            add('error', `Error: ${data.error || r.statusText}`);
            history.pop();
            return;
          }

          renderBlocks(data.content || []);

          if (data.wallet_error) {
            const w = data.wallet_error;
            const lines = [`Wallet blocked payment for "${w.tool || '?'}" (${w.price || '?'}):`, `  ${w.code}: ${w.message}`];
            if (w.daily_spend_cents !== undefined) {
              lines.push(`  Daily: ${fmtUSD(w.daily_spend_cents)} spent / ${fmtUSD(w.daily_limit_cents)} limit`);
            }
            add('error', lines.join('\n'));
            history.pop();
          } else if (data.payment_required) {
            add('error', `Payment required for "${data.tool}" (${data.price_usd}) but wallet could not auto-pay.`);
            history.pop();
          } else {
            const lastText = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
            if (lastText) history.push({ role: 'assistant', content: lastText });
          }
        } catch (err) {
          add('error', `Network error: ${err.message}`);
          history.pop();
        } finally {
          send.disabled = false;
          input.focus();
          refreshWallet();
        }
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
      });
    </script>
  </body>
</html>
