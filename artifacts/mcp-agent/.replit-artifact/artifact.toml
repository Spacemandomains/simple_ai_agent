kind = "web"
previewPath = "/"
title = "MCP Test Agent"
version = "1.0.0"
id = "artifacts/mcp-agent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21501

[services.development]
run = "pnpm --filter @workspace/mcp-agent run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mcp-agent", "run", "build" ]
publicDir = "artifacts/mcp-agent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21501"
BASE_PATH = "/"
